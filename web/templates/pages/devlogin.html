{{define "devlogin"}}
{{template "layout_start" .}}
<h1>Connexion (mode développement)</h1>
<p>Environnement de développement — connexion sans GitHub OAuth.</p>
<form method="get" action="/dev/login">
  <label>
    Email :
    <input type="email" name="email" value="admin@test.com" required>
  </label>
  <button type="submit" class="button">Se connecter</button>
</form>
<hr>
<p><a href="/login">Retour</a></p>
{{template "layout_end" .}}
{{end}}
