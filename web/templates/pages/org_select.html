{{define "org_select"}}
{{template "layout_start" .}}
<p>Sélectionnez l'organisation avec laquelle vous souhaitez travailler.</p>
{{if .Error}}<mb-alert variant="danger">{{.Error}}</mb-alert>{{end}}

<form method="post" action="/org/select" class="stack-form org-select-form">
  <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
  <mb-radio-group label="Organisations" name="organization_id" required value="{{.DefaultOrgID}}">
    {{range .Organizations}}
    <mb-radio value="{{.Organization.ID}}" label="{{.Organization.Name}} ({{.Organization.Slug}})"></mb-radio>
    {{end}}
  </mb-radio-group>
  <mb-button type="submit">Continuer</mb-button>
</form>
{{template "layout_end" .}}
{{end}}
