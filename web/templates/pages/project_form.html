{{define "project_form"}}
{{template "layout_start" .}}

<div class="card">
  {{if .Error}}<p class="error" role="alert">{{.Error}}</p>{{end}}
  <form method="post" action="{{.FormAction}}" class="stack-form">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <label>
      Nom
      <input type="text" name="name" required maxlength="200" value="{{if .Project}}{{.Project.Name}}{{end}}">
    </label>
    <label>
      Description
      <textarea name="description" rows="4">{{if .Project}}{{.Project.Description}}{{end}}</textarea>
    </label>
    <label>
      Tags
      <span class="field-hint">Séparez les tags par des virgules (ex. k8s, frontend). Les modèles tagués correspondants seront proposés pour ce projet.{{if .Project}} <a href="/projects/{{.Project.ID}}/templates">Voir les modèles compatibles</a>.{{end}}</span>
      <input type="text" name="tags" maxlength="500" value="{{.Tags}}">
    </label>
    <div class="form-actions">
      <button type="submit" class="button">Enregistrer</button>
    </div>
  </form>
</div>

{{if .Project}}
<section class="card form-danger-zone">
  <p class="form-danger-zone__text">Archiver retire le projet de la liste active. Cette action est irréversible.</p>
  <form method="post" action="/projects/{{.Project.ID}}/archive" onsubmit="return confirm('Archiver ce projet ?');">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <button type="submit" class="button-danger">Archiver le projet</button>
  </form>
</section>
{{end}}
{{template "layout_end" .}}
{{end}}
{{define "main_class"}} site-main--wide{{end}}
