{{define "run_wizard_launch"}}
{{template "layout_start" .}}
<div class="card">
  {{if .Error}}<p class="error" role="alert">{{.Error}}</p>{{end}}

  <form method="post" action="{{.FormAction}}" class="stack-form">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <input type="hidden" name="template_id" value="{{.Template.ID}}">
    <label>
      Titre de la revue
      <input type="text" name="title" required maxlength="200" value="{{.Title}}">
    </label>
    <label>
      Échéance (optionnel)
      <input type="date" name="due_date" value="{{.DueDate}}">
    </label>
    <div class="form-actions">
      <button type="submit" class="button">{{icon "check"}} Lancer la revue</button>
    </div>
  </form>
</div>
{{template "layout_end" .}}
{{end}}
