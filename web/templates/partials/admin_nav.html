{{define "admin_nav"}}
<label class="admin-nav-jump">
  <span class="visually-hidden">Section administration</span>
  <select class="admin-nav-jump__select" onchange="if (this.value) location.href = this.value">
    <option value="">Aller à…</option>
    <optgroup label="Gestion">
      <option value="/admin/users"{{if eq .AdminSection "users"}} selected{{end}}>Emails autorisés</option>
      <option value="/admin/teams"{{if eq .AdminSection "teams"}} selected{{end}}>Équipes</option>
      <option value="/admin/subjects"{{if eq .AdminSection "subjects"}} selected{{end}}>{{.Labels.Subject.Plural}}</option>
      <option value="/admin/settings/labels"{{if eq .AdminSection "labels"}} selected{{end}}>Libellé</option>
      <option value="/admin/settings/policies"{{if eq .AdminSection "policies"}} selected{{end}}>Politiques</option>
    </optgroup>
    {{if .CanManageOrgUsers}}
    <optgroup label="Intégrations">
      <option value="/admin/integrations"{{if eq .AdminSection "integrations"}} selected{{end}}>Vue d'ensemble</option>
      <option value="/admin/settings/smtp"{{if eq .AdminSection "smtp"}} selected{{end}}>SMTP</option>
      <option value="/admin/settings/webhooks"{{if eq .AdminSection "webhooks"}} selected{{end}}>Webhooks</option>
      <option value="/admin/integrations/jira"{{if eq .AdminSection "jira"}} selected{{end}}>Jira</option>
      <option value="/admin/integrations/notion"{{if eq .AdminSection "notion"}} selected{{end}}>Notion</option>
    </optgroup>
    {{end}}
  </select>
</label>
<nav class="admin-nav" aria-label="Administration">
  <div class="admin-nav__group">
    <span class="admin-nav__group-label">Gestion</span>
    <a href="/admin/users"{{if eq .AdminSection "users"}} aria-current="page"{{end}}>Emails autorisés</a>
    <a href="/admin/teams"{{if eq .AdminSection "teams"}} aria-current="page"{{end}}>Équipes</a>
    <a href="/admin/subjects"{{if eq .AdminSection "subjects"}} aria-current="page"{{end}}>{{.Labels.Subject.Plural}}</a>
    <a href="/admin/settings/labels"{{if eq .AdminSection "labels"}} aria-current="page"{{end}}>Libellé</a>
    <a href="/admin/settings/policies"{{if eq .AdminSection "policies"}} aria-current="page"{{end}}>Politiques</a>
  </div>
  {{if .CanManageOrgUsers}}
  <div class="admin-nav__group">
    <span class="admin-nav__group-label">Intégrations</span>
    <a href="/admin/integrations"{{if eq .AdminSection "integrations"}} aria-current="page"{{end}}>Vue d'ensemble</a>
    <a href="/admin/settings/smtp"{{if eq .AdminSection "smtp"}} aria-current="page"{{end}}>SMTP</a>
    <a href="/admin/settings/webhooks"{{if eq .AdminSection "webhooks"}} aria-current="page"{{end}}>Webhooks</a>
    <a href="/admin/integrations/jira"{{if eq .AdminSection "jira"}} aria-current="page"{{end}}>Jira</a>
    <a href="/admin/integrations/notion"{{if eq .AdminSection "notion"}} aria-current="page"{{end}}>Notion</a>
  </div>
  {{end}}
</nav>
{{end}}
