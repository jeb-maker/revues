{{define "stepper"}}
<nav class="stepper" aria-label="Progression">
  {{range $i, $s := .Steps}}
  <div class="stepper__step{{if eq $s.Status "active"}} stepper__step--active{{end}}{{if eq $s.Status "done"}} stepper__step--done{{end}}">
    <span class="stepper__num">{{if eq $s.Status "done"}}{{icon "check"}}{{else}}{{$i | add 1}}{{end}}</span>
    <span class="stepper__label">{{$s.Label}}</span>
  </div>
  {{if lt $i (sub (len $.Steps) 1)}}<span class="stepper__sep" aria-hidden="true"></span>{{end}}
  {{end}}
</nav>
{{end}}
