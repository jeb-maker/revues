{{define "run_progress_fragment"}}
<div id="run-progress" class="run-progress" aria-label="Progression de la revue">
  <div class="run-progress-track">
    <div class="run-progress-bar" style="width: {{.Percent}}%"></div>
  </div>
  <p class="muted">{{.Done}} / {{.Total}} points traités</p>
</div>
{{end}}
