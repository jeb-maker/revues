version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - sqlclosecheck
    - noctx
    - errorlint
    - misspell

  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - '(*database/sql.Rows).Close'
        - '(*crypto/tls.Conn).Close'
        - '(*net/smtp.Client).Close'
        - '(net.Listener).Close'
    govet:
      enable-all: true
      disable:
        - fieldalignment
    staticcheck:
      checks: ["all", "-ST1000"]

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - noctx
      - path: cmd/seed/
        linters:
          - misspell
      - path: internal/auth/github\.go
        linters:
          - errcheck
      - path: internal/integrations/
        linters:
          - errcheck
      - path: internal/store/dashboard\.go
        linters:
          - errcheck
      - path: internal/notifications/mailer\.go
        linters:
          - noctx

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
