run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - sqlclosecheck
    - noctx
    - errorlint
    - gofmt
    - misspell

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - fieldalignment  # micro-optimisation, bruit sur structs
  staticcheck:
    checks: ["all", "-ST1000"]  # package comment optionnel en interne

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck  # fermeture httptest tolérée si test court
  max-issues-per-linter: 0
  max-same-issues: 0
